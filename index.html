<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nisp_08_shopping - Lista Zakupów</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Sklep Spożywczy</h1>
        <nav>
            <a href="index.html" class="active">Lista produktów</a>
            <a href="#">Koszyk</a> </nav>
    </header>

    <main>
        <section id="shop-section">
            <h2>Dostępne produkty</h2>
            <div id="product-list" class="grid-container">
                </div>
        </section>

        <hr>

        <section id="order-section">
            <h2>Podsumowanie i Zamówienie</h2>
            <div id="order-summary">
                <p>Twój koszyk jest pusty.</p>
            </div>
            <form id="order-form">
                <input type="text" id="user-name" placeholder="Twoje imię i nazwisko" required>
                <input type="email" id="user-email" placeholder="Adres e-mail" required>
                <button type="submit" id="confirm-order">Potwierdzam zamówienie</button>
            </form>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
